<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zymoscope</title>
<script src="/static/chart.min.js"></script>
<style>
  :root {
    --bg:       #121218;
    --surface:  #1c1c26;
    --border:   #2a2a3a;
    --text:     #e0e0e8;
    --dim:      #888898;
    --accent:   #f0a020;
    --heat:     #e05040;
    --cool:     #40a0e0;
    --green:    #40c060;
    --radius:   8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 1.4rem; color: var(--accent); }
  header .status { font-size: .85rem; color: var(--dim); }
  header .status .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim); margin-right: 4px; vertical-align: middle;
  }
  header .status .dot.ok { background: var(--green); }

  .layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 1rem;
    padding: 1rem 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* --- Device cards --- */
  .devices { display: grid; gap: 1rem; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem;
  }
  .card-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: .8rem;
  }
  .card-header h2 { font-size: 1rem; font-weight: 600; }
  .card-header .rssi { font-size: .75rem; color: var(--dim); }
  .card-header .meta {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }
  .last-seen { font-size: .7rem; color: var(--dim); }
  .last-seen.stale { color: var(--heat); }
  .last-seen .badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    background: var(--border); color: var(--dim); font-size: .65rem;
    text-transform: uppercase; letter-spacing: .04em; margin-right: 4px;
  }
  .last-seen.stale .badge { background: var(--heat); color: #000; }
  .card.offline .metric .val { color: var(--dim); }
  .metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .6rem;
    margin-bottom: .8rem;
  }
  .metric { text-align: center; }
  .metric .val { font-size: 1.8rem; font-weight: 700; }
  .metric .lbl { font-size: .7rem; color: var(--dim); text-transform: uppercase; }
  .metric.temp .val { color: var(--heat); }
  .secondary {
    display: flex; gap: 1rem; justify-content: center;
    font-size: .8rem; color: var(--dim); margin-bottom: .6rem;
  }
  .relays { display: flex; gap: .6rem; justify-content: center; margin-bottom: .8rem; }
  .relay-dot {
    width: 12px; height: 12px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--border);
  }
  .relay-dot.heat.on { background: var(--heat); box-shadow: 0 0 6px var(--heat); }
  .relay-dot.cool.on { background: var(--cool); box-shadow: 0 0 6px var(--cool); }
  .relay-label { font-size: .7rem; color: var(--dim); text-align: center; }
  .relay-group { text-align: center; }
  .chart-wrap { height: 180px; }
  .chart-wrap.full { height: 340px; }

  /* --- Time range selector --- */
  .range-bar {
    display: flex; gap: .3rem; justify-content: flex-end;
    margin-bottom: .6rem; flex-wrap: wrap;
  }
  .range-bar button {
    background: var(--bg); color: var(--dim); border: 1px solid var(--border);
    padding: .25rem .55rem; border-radius: 4px; cursor: pointer;
    font-size: .7rem; font-weight: 600; letter-spacing: .02em;
  }
  .range-bar button:hover { color: var(--text); }
  .range-bar button.active {
    background: var(--accent); color: #000; border-color: var(--accent);
  }
  .range-bar .expand {
    margin-left: auto; background: transparent; color: var(--dim);
  }
  .range-bar .expand.active { color: var(--accent); border-color: var(--accent); }

  /* --- Smart Plug --- */
  .plug-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem; margin-bottom: .6rem;
  }
  .plug-card h4 { font-size: .85rem; margin-bottom: .5rem; }
  .plug-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: .8rem; padding: .2rem 0;
  }
  .plug-row .lbl { color: var(--dim); }
  .plug-row .val { font-weight: 600; }
  .plug-toggle {
    background: var(--border); color: var(--text); border: none;
    padding: .3rem .7rem; border-radius: 4px; cursor: pointer;
    font-size: .75rem; font-weight: 600;
  }
  .plug-toggle.on { background: var(--green); color: #000; }
  .plug-toggle.off { background: var(--heat); color: #fff; }

  .no-devices {
    text-align: center; color: var(--dim); padding: 3rem 1rem;
    font-size: .95rem;
  }

  /* --- Sidebar --- */
  .sidebar h3 { font-size: .95rem; margin-bottom: .6rem; color: var(--accent); }
  .batch-list { list-style: none; margin-bottom: 1.2rem; }
  .batch-list li {
    padding: .5rem 0; border-bottom: 1px solid var(--border);
    font-size: .85rem;
  }
  .batch-list .style { color: var(--dim); font-size: .75rem; }
  .form-group { margin-bottom: .6rem; }
  .form-group label { display: block; font-size: .75rem; color: var(--dim); margin-bottom: 2px; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: .4rem .5rem;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; font-size: .85rem;
  }
  .form-group textarea { resize: vertical; min-height: 50px; }
  button.btn {
    background: var(--accent); color: #000; border: none;
    padding: .45rem 1rem; border-radius: 4px; cursor: pointer;
    font-size: .85rem; font-weight: 600;
  }
  button.btn:hover { filter: brightness(1.15); }
  .setpoint-ctrl { display: flex; gap: .5rem; align-items: center; margin-bottom: 1rem; }
  .setpoint-ctrl input {
    width: 5rem; padding: .4rem .5rem; text-align: center;
    background: var(--bg); color: var(--text); border: 1px solid var(--border);
    border-radius: 4px; font-size: 1rem; font-weight: 600;
  }
  .setpoint-ctrl .unit { color: var(--dim); font-size: .85rem; }
  .setpoint-ctrl .current { color: var(--dim); font-size: .75rem; }
</style>
</head>
<body>

<header>
  <h1>Zymoscope</h1>
  <div class="status">
    <span class="dot" id="ws-dot"></span>
    <span id="device-count">0</span> device(s)
  </div>
</header>

<div class="layout">
  <section class="devices" id="devices">
    <div class="no-devices" id="no-devices">Waiting for devices&hellip;</div>
  </section>

  <aside class="sidebar">
    <div class="card">
      <h3>Target Temperature</h3>
      <div class="setpoint-ctrl">
        <input type="number" id="setpoint-input" step="0.5" min="0" max="40" value="20.0">
        <span class="unit">&deg;C</span>
        <button class="btn" id="setpoint-btn">Set</button>
      </div>
      <h3>Smart Plugs</h3>
      <div id="plug-section" style="margin-bottom:1rem">
        <div style="color:var(--dim);font-size:.8rem">No plugs configured</div>
      </div>
      <h3>Batches</h3>
      <ul class="batch-list" id="batch-list">
        <li style="color:var(--dim)">No batches yet</li>
      </ul>
      <h3>New Batch</h3>
      <form id="batch-form">
        <div class="form-group">
          <label>Name</label>
          <input name="name" required placeholder="e.g. Hefeweizen #4">
        </div>
        <div class="form-group">
          <label>Device</label>
          <select name="device_id" id="device-select" required>
            <option value="">-- select --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Style</label>
          <input name="style" placeholder="e.g. Wheat Beer">
        </div>
        <div class="form-group">
          <label>OG</label>
          <input name="og" type="number" step="0.001" placeholder="1.050">
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea name="notes" placeholder="Optional notes"></textarea>
        </div>
        <button type="submit" class="btn">Create Batch</button>
      </form>
    </div>
  </aside>
</div>

<script>
(function() {
  "use strict";

  const devices = {};   // device_id -> { el, chart, data }
  const devicesEl = document.getElementById("devices");
  const noDevicesEl = document.getElementById("no-devices");
  const wsDot = document.getElementById("ws-dot");
  const deviceCount = document.getElementById("device-count");
  const batchList = document.getElementById("batch-list");
  const deviceSelect = document.getElementById("device-select");
  const batchForm = document.getElementById("batch-form");
  const setpointInput = document.getElementById("setpoint-input");
  const setpointBtn = document.getElementById("setpoint-btn");

  // -- setpoint control (persisted server-side so all clients stay in sync) --
  // We keep one "current" device's setpoint in the shared input. For multi-
  // device setups this is just the first known device; the server stores a
  // setpoint per-device regardless.
  let setpointDirty = false;
  setpointInput.addEventListener("input", () => { setpointDirty = true; });

  setpointBtn.addEventListener("click", async () => {
    const val = parseFloat(setpointInput.value);
    if (isNaN(val)) return;
    const ids = Object.keys(devices);
    if (!ids.length) { alert("No device connected"); return; }
    const id = ids[0];
    try {
      const res = await fetch(`/api/setpoint/${encodeURIComponent(id)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ setpoint: val }),
      });
      const j = await res.json();
      if (j.error) alert(j.error);
      else setpointDirty = false;
    } catch (e) { alert("Failed: " + e); }
  });

  // Apply a stored setpoint from the server without clobbering in-progress edits.
  function applyStoredSetpoint(value) {
    if (value == null) return;
    if (document.activeElement === setpointInput && setpointDirty) return;
    setpointInput.value = Number(value).toFixed(1);
  }

  async function loadSetpoint() {
    try {
      const res = await fetch("/api/state");
      const state = await res.json();
      // Pick the first device's stored setpoint, if any.
      for (const id of Object.keys(state)) {
        if (state[id] && state[id].setpoint != null) {
          applyStoredSetpoint(state[id].setpoint);
          break;
        }
      }
    } catch {}
  }

  // -- helpers --
  function fmtTemp(tc) {
    if (tc == null) return "--";
    if (typeof tc === "string") {
      try { const arr = JSON.parse(tc); if (arr.length) return Number(arr[0]).toFixed(1); } catch {}
      return Number(tc).toFixed(1);
    }
    if (Array.isArray(tc)) return tc.length ? Number(tc[0]).toFixed(1) : "--";
    return Number(tc).toFixed(1);
  }
  function fmtVal(v, d) { return v != null ? Number(v).toFixed(d || 1) : "--"; }

  // -- build a device card --
  function ensureDevice(id) {
    if (devices[id]) return devices[id];
    noDevicesEl.style.display = "none";
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-header">
        <h2>${id}</h2>
        <div class="meta">
          <span class="rssi" data-f="rssi"></span>
          <span class="last-seen" data-f="last-seen"></span>
        </div>
      </div>
      <div class="metrics">
        <div class="metric temp"><div class="val" data-f="temp">--</div><div class="lbl">Temp &deg;C</div></div>
      </div>
      <div class="secondary">
        <span>Humidity: <b data-f="humidity">--</b>%</span>
        <span>Pressure: <b data-f="pressure">--</b> hPa</span>
      </div>
      <div class="relays">
        <div class="relay-group"><div class="relay-dot heat" data-f="relay1"></div><div class="relay-label">Heat</div></div>
        <div class="relay-group"><div class="relay-dot cool" data-f="relay2"></div><div class="relay-label">Cool</div></div>
      </div>
      <div class="range-bar" data-f="range-bar">
        <button data-range="1">1h</button>
        <button data-range="6">6h</button>
        <button data-range="24" class="active">24h</button>
        <button data-range="168">7d</button>
        <button data-range="720">30d</button>
        <button data-range="0">All</button>
        <button class="expand" data-f="expand" title="Toggle full history view">Expand</button>
      </div>
      <div class="chart-wrap" data-f="chart-wrap"><canvas></canvas></div>
    `;
    devicesEl.appendChild(card);

    const canvas = card.querySelector("canvas");
    const chart = new Chart(canvas, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          { label: "Temp C", data: [], borderColor: "#e05040", borderWidth: 1.5, pointRadius: 0, tension: 0.3, yAxisID: "y" },
          { label: "Heater", data: [], borderColor: "#f0a020", borderWidth: 1.2, pointRadius: 0, stepped: true, fill: true, backgroundColor: "rgba(240,160,32,0.08)", yAxisID: "y1" },
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { display: true, labels: { color: "#888", boxWidth: 12, font: { size: 10 } } } },
        scales: {
          x: { display: true, ticks: { color: "#555", maxTicksLimit: 6, font: { size: 9 } }, grid: { color: "#222" } },
          y:  { position: "left",  ticks: { color: "#e05040", font: { size: 9 } }, grid: { color: "#222" }, title: { display: false } },
          y1: { position: "right", min: 0, max: 1, display: false },
        }
      }
    });

    const entry = {
      el: card,
      chart,
      labels: [],
      temps: [],
      heater: [],
      timestamps: [],
      rangeHours: 24,  // default time window
      expanded: false,
    };
    devices[id] = entry;

    // Wire up the per-card time-range selector.
    const rangeBar = card.querySelector('[data-f="range-bar"]');
    rangeBar.addEventListener("click", (ev) => {
      const btn = ev.target.closest("button");
      if (!btn) return;
      if (btn.dataset.range !== undefined) {
        const h = Number(btn.dataset.range);
        entry.rangeHours = h;
        rangeBar.querySelectorAll("button[data-range]").forEach((b) =>
          b.classList.toggle("active", b === btn)
        );
        fetchHistory(id);
      } else if (btn.dataset.f === "expand") {
        entry.expanded = !entry.expanded;
        btn.classList.toggle("active", entry.expanded);
        card.querySelector('[data-f="chart-wrap"]').classList.toggle("full", entry.expanded);
        entry.chart.resize();
      }
    });

    // Add to device select if not present.
    if (!deviceSelect.querySelector(`option[value="${id}"]`)) {
      const opt = document.createElement("option");
      opt.value = id; opt.textContent = id;
      deviceSelect.appendChild(opt);
    }

    updateDeviceCount();
    fetchLatest(id);
    fetchHistory(id);
    return entry;
  }

  // Grab the most recent stored row so the metric tiles always show the last
  // known reading, even if it's outside the current range window.
  async function fetchLatest(id) {
    try {
      const res = await fetch(`/api/telemetry/${encodeURIComponent(id)}/latest`);
      const row = await res.json();
      const entry = devices[id];
      if (!entry || !row || !row.timestamp) return;
      if (entry.lastSeen == null) {
        applyMetrics(entry, row, row.timestamp * 1000);
      }
    } catch {}
  }

  // Format a timestamp appropriately for the currently selected range.
  function fmtLabel(ts, rangeHours) {
    const d = ts instanceof Date ? ts : new Date(ts);
    // Ranges > 48h show day+time so the axis stays readable across many hours.
    if (rangeHours === 0 || rangeHours > 48) {
      return d.toLocaleString([], {
        month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit",
      });
    }
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  // Fill the metric tiles + last-seen from a telemetry row (live or historical).
  // Does NOT touch the chart.
  function applyMetrics(entry, d, tsMs) {
    const el = entry.el;
    const q = (sel) => el.querySelector(`[data-f="${sel}"]`);
    q("temp").textContent = fmtTemp(d.temp_c);
    q("humidity").textContent = fmtVal(d.humidity, 1);
    q("pressure").textContent = fmtVal(d.pressure, 1);
    q("rssi").textContent = d.rssi != null ? d.rssi + " dBm" : "";
    q("relay1").classList.toggle("on", !!d.relay1);
    q("relay2").classList.toggle("on", !!d.relay2);
    if (tsMs != null) {
      entry.lastSeen = tsMs;
      updateLastSeen(entry);
    }
  }

  // Render the "last seen" tag and toggle the offline style.
  function updateLastSeen(entry) {
    const el = entry.el;
    const tag = el.querySelector('[data-f="last-seen"]');
    if (!entry.lastSeen) { tag.textContent = ""; return; }
    const ageSec = Math.max(0, Math.round((Date.now() - entry.lastSeen) / 1000));
    const stale = ageSec > 120;  // >2min without data -> treat as offline
    el.classList.toggle("offline", stale);
    tag.classList.toggle("stale", stale);
    const badge = stale ? '<span class="badge">offline</span>' : '';
    tag.innerHTML = badge + "last seen " + humanAge(ageSec);
  }

  function humanAge(sec) {
    if (sec < 60) return sec + "s ago";
    if (sec < 3600) return Math.round(sec / 60) + "m ago";
    if (sec < 86400) return Math.round(sec / 3600) + "h ago";
    return Math.round(sec / 86400) + "d ago";
  }

  function updateCard(id, d) {
    const entry = ensureDevice(id);

    // Append to chart
    const ts = d.timestamp ? new Date(d.timestamp * 1000) : new Date();
    const tempVal = parseTemp(d.temp_c);

    applyMetrics(entry, d, ts.getTime());

    entry.timestamps.push(ts);
    entry.labels.push(fmtLabel(ts, entry.rangeHours));
    entry.temps.push(tempVal);
    entry.heater.push(d.relay1 ? 1 : 0);

    // Drop points that have fallen outside the visible window (when bounded).
    if (entry.rangeHours > 0) {
      const cutoff = Date.now() - entry.rangeHours * 3600 * 1000;
      while (entry.timestamps.length && entry.timestamps[0].getTime() < cutoff) {
        entry.timestamps.shift();
        entry.labels.shift();
        entry.temps.shift();
        entry.heater.shift();
      }
    }

    entry.chart.data.labels = entry.labels;
    entry.chart.data.datasets[0].data = entry.temps;
    entry.chart.data.datasets[1].data = entry.heater;
    entry.chart.update("none");
  }

  function parseTemp(tc) {
    if (tc == null) return null;
    if (typeof tc === "string") {
      try { const arr = JSON.parse(tc); if (arr.length) return Number(arr[0]); } catch {}
      return Number(tc) || null;
    }
    if (Array.isArray(tc)) return tc.length ? Number(tc[0]) : null;
    return Number(tc);
  }

  function updateDeviceCount() {
    deviceCount.textContent = Object.keys(devices).length;
  }

  // -- fetch historical data for chart, using the device's active range --
  async function fetchHistory(id) {
    try {
      const entry = devices[id];
      if (!entry) return;
      const hours = entry.rangeHours;
      const res = await fetch(
        `/api/telemetry/${encodeURIComponent(id)}?hours=${hours}`
      );
      const rows = await res.json();

      entry.timestamps.length = 0;
      entry.labels.length = 0;
      entry.temps.length = 0;
      entry.heater.length = 0;
      // Downsample large series so Chart.js stays responsive (cap ~2000 pts).
      const cap = 2000;
      const step = rows.length > cap ? Math.ceil(rows.length / cap) : 1;
      for (let i = 0; i < rows.length; i++) {
        if (i % step !== 0 && i !== rows.length - 1) continue;
        const r = rows[i];
        const ts = new Date(r.timestamp * 1000);
        entry.timestamps.push(ts);
        entry.labels.push(fmtLabel(ts, hours));
        entry.temps.push(parseTemp(r.temp_c));
        entry.heater.push(r.relay1 ? 1 : 0);
      }
      entry.chart.data.labels = entry.labels;
      entry.chart.data.datasets[0].data = entry.temps;
      entry.chart.data.datasets[1].data = entry.heater;
      entry.chart.update("none");

      // If no live telemetry has arrived yet, seed the metric tiles and the
      // last-seen indicator from the most recent historical row so the card
      // reflects whatever the DB has (e.g. last night's amazake run).
      if (rows.length && entry.lastSeen == null) {
        const last = rows[rows.length - 1];
        applyMetrics(entry, last, last.timestamp * 1000);
      }
    } catch (e) { console.warn("fetchHistory failed", e); }
  }

  // -- WebSocket with auto-reconnect --
  let ws;
  function connectWs() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/ws`);
    ws.onopen = () => { wsDot.classList.add("ok"); };
    ws.onclose = () => { wsDot.classList.remove("ok"); setTimeout(connectWs, 3000); };
    ws.onerror = () => { ws.close(); };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === "snapshot") {
          if (msg.devices) {
            for (const [id, d] of Object.entries(msg.devices)) updateCard(id, d);
          }
          if (msg.state) {
            for (const id of Object.keys(msg.state)) {
              const sp = msg.state[id] && msg.state[id].setpoint;
              if (sp != null) { applyStoredSetpoint(sp); break; }
            }
          }
        } else if (msg.type === "state") {
          // Shared-state update from another client — sync our UI.
          if (msg.setpoint != null) applyStoredSetpoint(msg.setpoint);
        } else if (msg.device_id) {
          updateCard(msg.device_id, msg);
        }
      } catch (e) { console.warn("ws parse error", e); }
    };
  }
  connectWs();
  loadSetpoint();

  // -- Smart Plugs --
  const plugSection = document.getElementById("plug-section");

  async function loadPlugs() {
    try {
      const res = await fetch("/api/plugs");
      const plugs = await res.json();
      if (!plugs.length) return;
      plugSection.innerHTML = "";
      for (const p of plugs) {
        const div = document.createElement("div");
        div.className = "plug-card";
        const powerHtml = p.power_w != null
          ? `<div class="plug-row"><span class="lbl">Power</span><span class="val">${Number(p.power_w).toFixed(1)} W</span></div>
             <div class="plug-row"><span class="lbl">Voltage</span><span class="val">${Number(p.voltage_v).toFixed(1)} V</span></div>
             <div class="plug-row"><span class="lbl">Current</span><span class="val">${Number(p.current_a).toFixed(3)} A</span></div>`
          : "";
        div.innerHTML = `
          <h4>${p.alias || p.host}</h4>
          <div class="plug-row">
            <span class="lbl">Status</span>
            <button class="plug-toggle ${p.is_on ? "on" : "off"}" data-host="${p.host}">${p.is_on ? "ON" : "OFF"}</button>
          </div>
          ${powerHtml}
        `;
        div.querySelector(".plug-toggle").addEventListener("click", async (e) => {
          const host = e.target.dataset.host;
          const action = e.target.classList.contains("on") ? "off" : "on";
          await fetch(`/api/plugs/${encodeURIComponent(host)}/${action}`, { method: "POST" });
          setTimeout(loadPlugs, 500);
        });
        plugSection.appendChild(div);
      }
    } catch {}
  }
  loadPlugs();
  setInterval(loadPlugs, 30000);

  // -- Batches --
  async function loadBatches() {
    try {
      const res = await fetch("/api/batches");
      const list = await res.json();
      if (!list.length) { batchList.innerHTML = '<li style="color:var(--dim)">No batches yet</li>'; return; }
      batchList.innerHTML = "";
      for (const b of list) {
        const li = document.createElement("li");
        const active = b.ended_at ? "" : ' <span style="color:var(--green);font-size:.7rem">● live</span>';
        li.innerHTML = `<a href="/batches/${b.id}" style="color:var(--text);text-decoration:none">` +
          `<strong>${b.name}</strong>${active} <span class="style">${b.style || ""}</span>` +
          (b.og ? ` &middot; OG ${Number(b.og).toFixed(3)}` : "") +
          (b.device_id ? ` &middot; ${b.device_id}` : "") +
          `</a>`;
        batchList.appendChild(li);
      }
    } catch {}
  }
  loadBatches();

  // -- Load known devices --
  async function loadDevices() {
    try {
      const res = await fetch("/api/devices");
      const list = await res.json();
      for (const d of list) ensureDevice(d.device_id);
    } catch {}
  }
  loadDevices();

  // Keep "last seen" labels ticking so the offline badge appears without a refresh.
  setInterval(() => {
    for (const id of Object.keys(devices)) updateLastSeen(devices[id]);
  }, 15000);

  // -- Batch form --
  batchForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const fd = new FormData(batchForm);
    const body = {};
    for (const [k, v] of fd.entries()) { if (v) body[k] = k === "og" ? parseFloat(v) : v; }
    try {
      await fetch("/api/batches", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      batchForm.reset();
      loadBatches();
    } catch (err) { console.error("batch create failed", err); }
  });

})();
</script>
</body>
</html>
